<!DOCTYPE html>
<html>
<head>
  <title>Team Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
    }

    header {
      background-color: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      padding: 20px;
      text-align: center;
    }

    .team {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    .member {
      background: white;
      padding: 15px;
      width: 200px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .member img {
      width: 100%;
      border-radius: 50%;
    }

    .member h3 {
      margin: 10px 0 5px;
    }

    .member p {
      color: gray;
      font-size: 14px;
    }

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>Our Team</h1>
  <p>Meet the people behind our project</p>
</header>

<div class="container">
  <div class="team">

    <div class="member">
      <img src="https://via.placeholder.com/150" alt="Member">
      <h3>Shivaraj</h3>
      <p>Frontend Developer</p>
    </div>

    <div class="member">
      <img src="https://via.placeholder.com/150" alt="Member">
      <h3>Sadiya</h3>
      <p>Backend Developer</p>
    </div>

    <div class="member">
      <img src="https://via.placeholder.com/150" alt="Member">
      <h3>Deepa</h3>
      <p>UI Designer</p>
    </div>

    <div class="member">
      <img src="https://via.placeholder.com/150" alt="Member">
      <h3>Umesh</h3>
      <p>Tester</p>
    </div>

  </div>
</div>

<footer>
  <p>© 2026 Team Project</p>
</footer>

</body>
</html>
